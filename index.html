<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>हरिपुर — रामचौरा मंदिर अभियान</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Hind:wght@300;400;500;600;700&family=Poppins:wght@400;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
/* ===== VARIABLES ===== */
:root {
  --saffron:      #FF6B00;
  --saffron-lt:   #FF8C33;
  --saffron-pale: #FFF3E8;
  --gold:         #D4A017;
  --gold-lt:      #F5C842;
  --maroon:       #8B1A1A;
  --maroon-dk:    #5C0F0F;
  --cream:        #FDF6EC;
  --white:        #FFFFFF;
  --txt-dk:       #2C1810;
  --txt-md:       #5C3D2E;
  --txt-lt:       #9B7B6A;
  --green:        #2D7D46;
  --shadow:       0 4px 20px rgba(139,26,26,0.10);
  --shadow-lg:    0 8px 36px rgba(139,26,26,0.16);
  --radius:       16px;
  --font-hi:      'Hind', sans-serif;
  --font-en:      'Poppins', sans-serif;
  --font-display: 'Playfair Display', serif;
}

* { 
  margin: 0; 
  padding: 0; 
  box-sizing: border-box; 
}

html { 
  scroll-behavior: smooth; 
}

body {
  font-family: var(--font-hi);
  background: var(--cream);
  color: var(--txt-dk);
  min-height: 100vh;
  overflow-x: hidden;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* ===== MAIN CONTAINER ===== */
.container {
  width: 100%;
  max-width: 480px;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: linear-gradient(180deg, #4A0A0A 0%, var(--maroon) 48%, var(--saffron) 100%);
  position: relative;
  overflow: hidden;
}

.container::before {
  content: '';
  position: absolute;
  inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 5L35 20L50 20L38 30L43 45L30 35L17 45L22 30L10 20L25 20Z' fill='rgba(255,255,255,0.022)'/%3E%3C/svg%3E") repeat;
  animation: bgFloat 28s linear infinite;
  pointer-events: none;
}

@keyframes bgFloat { 
  to { background-position: 60px 60px; } 
}

/* ===== VIDEO SECTION ===== */
.video-container {
  width: 100%;
  height: calc(100vh - 100px);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  position: relative;
  z-index: 1;
  padding: 0;
}

.video-player {
  width: 100%;
  height: 100%;
  max-height: 600px;
  border-radius: 0;
  overflow: hidden;
  background: #000;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
  position: relative;
}

.video-player video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.video-placeholder {
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #2C0A0A 0%, #5C1A1A 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: var(--gold-lt);
  text-align: center;
  padding: 20px;
}

.video-placeholder-icon {
  font-size: 4rem;
  margin-bottom: 16px;
  animation: omPulse 3s ease-in-out infinite;
}

@keyframes omPulse { 
  50% { transform: scale(1.07); opacity: 0.88; } 
}

.video-placeholder-text {
  font-size: 1.2rem;
  font-weight: 700;
  text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
  margin-bottom: 8px;
}

.video-placeholder-sub {
  font-size: 0.9rem;
  opacity: 0.8;
}

/* ===== VIDEO CONTROLS OVERLAY ===== */
.video-controls-overlay {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 5;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0, 0, 0, 0);
  transition: background 0.3s ease;
  cursor: pointer;
}

.video-controls-overlay:hover {
  background: rgba(0, 0, 0, 0.15);
}

.video-controls-overlay.playing {
  background: rgba(0, 0, 0, 0);
}

.play-pause-btn {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--saffron) 0%, var(--maroon) 100%);
  color: white;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.2rem;
  box-shadow: 0 8px 28px rgba(255, 107, 0, 0.4);
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  z-index: 10;
}

.play-pause-btn:hover {
  transform: scale(1.12);
  box-shadow: 0 12px 40px rgba(255, 107, 0, 0.5);
}

.play-pause-btn:active {
  transform: scale(0.95);
}

.play-pause-btn i {
  transition: all 0.2s ease;
}

.play-icon,
.pause-icon {
  position: absolute;
}

/* ===== HIDE CONTROLS WHEN PLAYING ===== */
.video-controls-overlay.playing .play-pause-btn {
  opacity: 0;
  pointer-events: none;
  transform: scale(0.8);
}

.video-controls-overlay:hover.playing .play-pause-btn {
  opacity: 1;
  pointer-events: auto;
  transform: scale(1);
}

/* ===== OVERLAY BRANDING ===== */
.video-overlay {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  z-index: 2;
  background: linear-gradient(to bottom, rgba(0, 0, 0, 0.6), transparent);
  padding: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  text-align: center;
}

.overlay-brand {
  color: var(--gold-lt);
  font-size: 0.9rem;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.overlay-icon {
  color: var(--saffron-lt);
  font-size: 1.3rem;
}

/* ===== STICKY BUTTON ===== */
.sticky-button-container {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 12px 16px;
  background: rgba(253, 246, 236, 0.98);
  backdrop-filter: blur(12px);
  box-shadow: 0 -4px 18px rgba(139, 26, 26, 0.12);
  z-index: 999;
  max-width: 480px;
  margin: 0 auto;
  width: 100%;
}

.btn-next {
  width: 100%;
  background: linear-gradient(135deg, var(--saffron) 0%, var(--maroon) 100%);
  color: white;
  border: none;
  padding: 16px;
  border-radius: 14px;
  font-family: var(--font-hi);
  font-size: 1.1rem;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  box-shadow: 0 4px 16px rgba(255, 107, 0, 0.38);
  transition: transform 0.15s, box-shadow 0.15s;
  letter-spacing: 0.3px;
  text-decoration: none;
}

.btn-next:active {
  transform: scale(0.98);
}

.btn-next:hover {
  box-shadow: 0 6px 20px rgba(255, 107, 0, 0.45);
}

.btn-next i {
  font-size: 1.2rem;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 600px) {
  .container {
    max-width: 100%;
    height: 100vh;
  }

  .video-container {
    height: calc(100vh - 100px);
  }

  .video-placeholder-icon {
    font-size: 3.5rem;
  }

  .btn-next {
    font-size: 1rem;
    padding: 14px 16px;
  }
}

@media (orientation: portrait) {
  body {
    width: 100%;
  }

  .container {
    width: 100%;
    max-width: none;
  }
}

/* ===== ANIMATIONS ===== */
@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.btn-next {
  animation: fadeInUp 0.6s ease-out 0.3s both;
}

/* ===== ACCESSIBILITY ===== */
a.btn-next {
  text-decoration: none;
}

a.btn-next:focus {
  outline: 2px solid var(--gold-lt);
  outline-offset: 2px;
}

button.btn-next:focus {
  outline: 2px solid var(--gold-lt);
  outline-offset: 2px;
}
</style>
</head>
<body>

<!-- ===== MAIN CONTAINER ===== -->
<div class="container">
  
  <!-- ===== VIDEO SECTION ===== -->
  <div class="video-container">
    <div class="video-player">
      <!-- VIDEO OVERLAY BRANDING -->
      <div class="video-overlay">
        <i class="fa-solid fa-om overlay-icon"></i>
        <span class="overlay-brand">जय श्री राम — हरिपुर अभियान</span>
      </div>

      <!-- PORTRAIT VIDEO (REEL) -->
      <!-- REPLACE src="reel.mp4" WITH YOUR VIDEO FILE -->
      <video id="portraitVideo" 
             playsinline
             preload="auto"
             style="width:100%; height:100%; object-fit:cover;">
        <source src="reel.mp4" type="video/mp4">
        <!-- FALLBACK: Show placeholder if video not found -->
      </video>

      <!-- CUSTOM PLAY/PAUSE BUTTON (CENTER) -->
      <div class="video-controls-overlay" id="controlsOverlay">
        <button id="playPauseBtn" class="play-pause-btn" title="Play/Pause">
          <i class="fa-solid fa-play play-icon"></i>
          <i class="fa-solid fa-pause pause-icon" style="display:none;"></i>
        </button>
      </div>

      <!-- PLACEHOLDER (shown if video fails to load) -->
      <div class="video-placeholder" id="videoPlaceholder" style="display:none;">
        <div class="video-placeholder-icon">🎬</div>
        <div class="video-placeholder-text">रामचौरा मंदिर</div>
        <div class="video-placeholder-sub">मंदिर निर्माण अभियान का विडियो</div>
      </div>
    </div>
  </div>
</div>

<!-- ===== STICKY BUTTON ===== -->
<div class="sticky-button-container">
  <a href="/ramchaura-mandir" class="btn-next">
    <i class="fa-solid fa-arrow-right"></i>
    अभियान शामिल होने के लिए क्लिक करें
  </a>
</div>

<script>
/* ===== VIDEO CONTROL LOGIC ===== */
document.addEventListener('DOMContentLoaded', () => {
  const video = document.getElementById('portraitVideo');
  const placeholder = document.getElementById('videoPlaceholder');
  const playPauseBtn = document.getElementById('playPauseBtn');
  const controlsOverlay = document.getElementById('controlsOverlay');
  const playIcon = playPauseBtn.querySelector('.play-icon');
  const pauseIcon = playPauseBtn.querySelector('.pause-icon');

  // ===== VIDEO ERROR HANDLING =====
  video.addEventListener('error', () => {
    video.style.display = 'none';
    placeholder.style.display = 'flex';
    controlsOverlay.style.display = 'none';
  });

  // ===== VIDEO CAN PLAY =====
  video.addEventListener('canplay', () => {
    placeholder.style.display = 'none';
    video.style.display = 'block';
  });

  // ===== PLAY/PAUSE BUTTON CLICK =====
  playPauseBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    
    if (video.paused) {
      // PLAY VIDEO AND UNMUTE
      video.muted = false;  // Unmute when playing
      video.play().then(() => {
        updateButtonState();
      }).catch((err) => {
        console.log('Play error:', err);
      });
    } else {
      // PAUSE VIDEO
      video.pause();
      updateButtonState();
    }
  });

  // ===== CLICK ON VIDEO AREA =====
  video.addEventListener('click', (e) => {
    e.stopPropagation();
    playPauseBtn.click();
  });

  // ===== UPDATE BUTTON & OVERLAY STATE =====
  function updateButtonState() {
    if (video.paused) {
      playIcon.style.display = 'block';
      pauseIcon.style.display = 'none';
      controlsOverlay.classList.remove('playing');
    } else {
      playIcon.style.display = 'none';
      pauseIcon.style.display = 'block';
      controlsOverlay.classList.add('playing');
    }
  }

  // ===== LISTEN FOR PLAY/PAUSE EVENTS =====
  video.addEventListener('play', updateButtonState);
  video.addEventListener('pause', updateButtonState);

  // ===== SHOW CONTROLS ON HOVER =====
  controlsOverlay.addEventListener('mouseenter', () => {
    if (!video.paused) {
      // Show pause button on hover when video is playing
      controlsOverlay.classList.add('playing');
    }
  });

  controlsOverlay.addEventListener('mouseleave', () => {
    if (!video.paused) {
      // Hide pause button when mouse leaves
      controlsOverlay.classList.add('playing');
    }
  });

  // ===== INITIAL STATE =====
  updateButtonState();

  // ===== KEYBOARD SHORTCUT: SPACEBAR TO PLAY/PAUSE =====
  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space' && document.activeElement === document.body) {
      e.preventDefault();
      playPauseBtn.click();
    }
  });
});

/* ===== BUTTON FUNCTIONALITY ===== */
document.querySelectorAll('.btn-next').forEach(btn => {
  btn.addEventListener('click', (e) => {
    // Smooth transition
    document.body.style.transition = 'opacity 0.3s ease-out';
    document.body.style.opacity = '0.95';
    
    setTimeout(() => {
      window.location.href = btn.getAttribute('href');
    }, 150);
  });
});
</script>

</body>
</html>
